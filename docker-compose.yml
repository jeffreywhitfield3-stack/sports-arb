version: '3.8'

services:
  sports-arb:
    build: .
    container_name: sports-arb
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env
    volumes:
      # Persist SQLite database across container restarts
      - ./data:/app/data
      # Persist logs
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
